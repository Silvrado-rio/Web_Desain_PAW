<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Gaming - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <img src="gambar/header.png" alt="Rio Gaming" class="header-image">
        </header>

        <main class="content">
            <form action="#">
                <div class="input-group">
                    <label for="email">Email/Username</label>
                    <input type="text" id="email" placeholder="something@somthing.com">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="*******">
                </div>
                
                <div class="options">
                    <a href="#" class="forgot-pwd">Forget Password?</a>
                    <p class="signup-text">Don't have one? <a href="register.html" class="signup-link">Sign Up</a></p>
                </div>

                <button type="submit" class="btn-primary"><span class="btn-text">LOGIN</span></button>
            </form>

            <div class="divider">Or</div>

            <button class="btn-google">
                <img src="gambar/google.png" alt="Google Logo" class="google-icon">
                <img src="gambar/google_text.png" alt="Google" class="google-text-img">
            </button>
            
            <button class="btn-rg">
                <img src="gambar/logo.png" alt="RG Account" class="rg-icon-small">
                RG Account
            </button>
        </main>
    </div>
</body>
</html>
