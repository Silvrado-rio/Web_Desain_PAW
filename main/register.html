<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio Gaming - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <img src="gambar/header.png" alt="Rio Gaming Header" class="header-image">
        </header>

        <main class="content">
            <form action="#">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="something@somthing.com">
                </div>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Something">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="*******">
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="*******">
                </div>

                <div class="options">
                    <p class="signup-text">Already have an account? <a href="login.html" class="signup-link">Login</a></p>
                </div>

                <button type="submit" class="btn-primary mt-custom"><span class="btn-text">REGISTER</span></button>
            </form>

            <div class="divider">Or</div>

            <button class="btn-google">
                <img src="gambar/google.png" alt="Google Logo" class="google-icon">
                <span class="google-text">Google</span>
            </button>
            
            <button class="btn-rg">
                <img src="gambar/logo.png" alt="RG Account" class="rg-icon-small">
                RG Account
            </button>
        </main>
    </div>
</body>
</html>
